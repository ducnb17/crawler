# Frontend nginx — serve Vue SPA + reverse proxy API + SSE to backend
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Common proxy headers for backend
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Backend REST routes (no /api prefix in backend)
    location ~ ^/(auth|users|jobs|runs|results|health|ready|metrics|openapi.json) {
        proxy_pass http://backend:8001;
        proxy_http_version 1.1;
    }

    # SSE: long-lived, disable buffering (must be matched before generic proxy)
    location ~ ^/runs/.+/events$ {
        proxy_pass http://backend:8001;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        chunked_transfer_encoding off;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}